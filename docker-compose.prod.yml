version: "3.8"

services:
  # ─── Next.js Admin Dashboard ───
  dropzy-admin:
    container_name: dropzy-admin
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://18.60.129.43:8080/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://18.60.129.43:8080/api/v1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ─── Nginx Reverse Proxy ───
  nginx:
    container_name: dropzy-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dropzy-admin:
        condition: service_healthy
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
