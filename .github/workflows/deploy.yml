name: Deploy Dropzy Admin Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: dropzy-admin

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Build & Push Docker Image to ECR
  # ─────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository (if not exists)
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}:8080/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Stage 2: Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry
        id: ecr
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text | sed 's|/.*||')
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "========================================="
            echo "  Deploying Dropzy Admin Dashboard"
            echo "========================================="

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}

            # Pull latest image
            echo "Pulling latest image..."
            docker pull ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

            # Stop & remove old admin container
            echo "Stopping old container..."
            docker stop dropzy-admin 2>/dev/null || true
            docker rm dropzy-admin 2>/dev/null || true

            # Run new admin container
            echo "Starting new container..."
            docker run -d \
              --name dropzy-admin \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_URL="http://${{ secrets.EC2_PUBLIC_IP }}:8080/api/v1" \
              ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

            # ─── Setup Nginx (first time only) ───
            if ! docker ps -q -f name=dropzy-nginx | grep -q .; then
              echo "Setting up Nginx reverse proxy..."

              mkdir -p /home/ubuntu/nginx
              cat > /home/ubuntu/nginx/default.conf << 'NGINXEOF'
            upstream nextjs {
                server 127.0.0.1:3000;
            }

            upstream gobackend {
                server 127.0.0.1:8080;
            }

            server {
                listen 80;
                server_name _;

                location /api/ {
                    proxy_pass http://gobackend;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_connect_timeout 30s;
                    proxy_read_timeout 60s;
                }

                location / {
                    proxy_pass http://nextjs;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                }

                location /_next/static/ {
                    proxy_pass http://nextjs;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }

                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
                gzip_min_length 1000;
                client_max_body_size 20M;
            }
            NGINXEOF

              docker run -d \
                --name dropzy-nginx \
                --restart unless-stopped \
                --network host \
                -v /home/ubuntu/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro \
                nginx:alpine
            else
              echo "Nginx already running, reloading config..."
              docker exec dropzy-nginx nginx -s reload 2>/dev/null || true
            fi

            # Wait for startup
            echo "Waiting for admin dashboard to start..."
            sleep 10

            # Health check
            echo "Running health checks..."
            ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "http://localhost:3000/" || echo "000")
            API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "http://localhost:8080/api/v1/health" || echo "000")
            NGINX_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "http://localhost:80/" || echo "000")

            echo ""
            echo "========================================="
            echo "  Health Check Results"
            echo "========================================="
            echo "  Admin (3000): $ADMIN_STATUS"
            echo "  API   (8080): $API_STATUS"
            echo "  Nginx (80):   $NGINX_STATUS"
            echo "========================================="

            if [ "$ADMIN_STATUS" = "200" ]; then
              echo "✅ Admin Dashboard deployed successfully!"
            else
              echo "⚠️  Admin returned $ADMIN_STATUS — checking logs..."
              docker logs --tail 20 dropzy-admin
            fi

            # Cleanup old images
            docker image prune -f 2>/dev/null || true

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Dropzy Admin Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Admin URL** | http://${{ secrets.EC2_PUBLIC_IP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | http://${{ secrets.EC2_PUBLIC_IP }}:8080/api/v1 |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECR Image** | \`${{ env.ECR_REPOSITORY }}:${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
